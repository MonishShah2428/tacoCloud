spring.application.name=taco
spring.datasource.generate-unique-name=false
spring.datasource.name=tacocloud
spring.cassandra.keyspace-name=taco_cloud
spring.cassandra.schema-action=recreate
spring.cassandra.local-datacenter=datacenter1
spring.mongodb.database=tacoclouddb
spring.data.rest.base-path=/rest-api

spring.security.oauth2.client.registration.taco-client.provider=spring
spring.security.oauth2.client.registration.taco-client.client-id=taco-client
spring.security.oauth2.client.registration.taco-client.client-secret=secret
spring.security.oauth2.client.registration.taco-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.taco-client.redirect-uri=http://localhost:8080/login/oauth2/code/taco-client
spring.security.oauth2.client.registration.taco-client.scope=writeTacos,deleteTacos,openid

spring.security.oauth2.client.provider.spring.authorization-uri=http://localhost:8080/oauth2/authorize
spring.security.oauth2.client.provider.spring.token-uri=http://localhost:8080/oauth2/token
spring.security.oauth2.client.provider.spring.jwk-set-uri=http://localhost:8080/oauth2/jwks
spring.security.oauth2.client.provider.spring.user-info-uri=http://localhost:8080/userinfo
spring.security.oauth2.client.provider.spring.user-name-attribute=sub
management.endpoints.web.exposure.include=*

spring.rabbitmq.host=localhost